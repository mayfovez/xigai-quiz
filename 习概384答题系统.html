const TOTAL_QUESTIONS = 40;
let state = { questions: [], idx: 0, correct: 0, wrong: 0, answered: false, finished: false, wrongList: [] };

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function pickQuestions() {
  // Group by chapter
  const groups = {};
  ALL_QUESTIONS.forEach(q => {
    if (!groups[q.chapter]) groups[q.chapter] = [];
    groups[q.chapter].push(q);
  });
  
  const chapters = Object.keys(groups);
  // Sort by count ascending so small chapters get at least 1
  chapters.sort((a, b) => groups[a].length - groups[b].length);
  
  // Distribute: each chapter gets at least 1
  let selected = [];
  let remaining = TOTAL_QUESTIONS;
  
  // First pass: each chapter gets 1
  chapters.forEach(ch => {
    const pool = shuffle([...groups[ch]]);
    selected.push(pool[0]);
    remaining--;
  });
  
  // Second pass: distribute remaining to larger chapters
  // Sort by original size descending for fair distribution
  chapters.sort((a, b) => groups[a].length - groups[b].length);
  
  // Remove already selected
  const usedIds = new Set(selected.map(q => q.id));
  
  let pool = [];
  chapters.forEach(ch => {
    groups[ch].forEach(q => {
      if (!usedIds.has(q.id)) pool.push(q);
    });
  });
  
  shuffle(pool);
  selected.push(...pool.slice(0, Math.max(0, remaining)));
  
  shuffle(selected);
  return selected.slice(0, TOTAL_QUESTIONS);
}

function startQuiz() {
  const qs = pickQuestions();
  state = { questions: qs, idx: 0, correct: 0, wrong: 0, answered: false, finished: false, wrongList: [] };
  render();
}

function render() {
  if (state.finished) { renderResult(); return; }
  
  const q = state.questions[state.idx];
  const labels = ['A', 'B', 'C', 'D'];
  
  let html = `<div class="card">
    <span class="badge">${q.chapter}</span>
    <span class="badge type">第${q.num}题 · 单选</span>
    <div class="question-num">第 ${state.idx + 1} / ${state.questions.length} 题</div>
    <div class="question-text">${q.question}</div>
    <div class="options" id="options">`;
  
  q.options.forEach((opt, i) => {
    const letter = q.options_letters[i];
    const text = q.options_text[i];
    html += `<button class="option-btn" data-idx="${i}" data-letter="${letter}" onclick="answer(${i})">
      <strong>${letter}.</strong> ${text}
    </button>`;
  });
  
  html += `</div>
    <div class="feedback" id="feedback"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()" disabled>下一题 →</button>
  </div>`;
  
  document.getElementById('quizArea').innerHTML = html;
  updateStats();
}

function answer(idx) {
  if (state.answered) return;
  state.answered = true;
  
  const q = state.questions[state.idx];
  const btns = document.querySelectorAll('.option-btn');
  const correctLetter = q.answer_letter;
  const selectedLetter = btns[idx].dataset.letter;
  const isCorrect = selectedLetter === correctLetter;
  
  btns.forEach((btn, i) => {
    btn.disabled = true;
    const letter = btn.dataset.letter;
    if (letter === correctLetter) btn.classList.add('correct');
    if (i === idx && !isCorrect) btn.classList.add('wrong');
  });
  
  if (isCorrect) {
    state.correct++;
    showFeedback('correct', '✅ 回答正确！');
  } else {
    state.wrong++;
    const ansText = q.options_text[q.answer_index];
    state.wrongList.push({
      chapter: q.chapter,
      question: q.question,
      correct: ansText,
      userAnswer: q.options_text[idx]
    });
    showFeedback('wrong', `❌ 回答错误。<div class="answer-text">正确答案：<span style="color:#D32F2F;font-size:18px">${correctLetter}. ${ansText}</span></div>`);
  }
  document.getElementById('btnNext').disabled = false;
  updateStats();
}

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  fb.className = `feedback show ${type}`;
  fb.innerHTML = msg;
}

function nextQ() {
  state.idx++;
  state.answered = false;
  if (state.idx >= state.questions.length) state.finished = true;
  render();
}

function renderResult() {
  const total = state.questions.length;
  const pct = Math.round(state.correct / total * 100);
  let grade = '📚 继续加油！';
  if (pct >= 90) grade = '🌟 优秀！';
  else if (pct >= 80) grade = '👍 良好！';
  else if (pct >= 60) grade = '✅ 及格！';
  
  let html = `<div class="card result-card">
    <h2>🎉 答题完成！</h2>
    <div class="score">${pct}分</div>
    <div style="font-size:24px;font-weight:600;color:#333">${grade}</div>
    <div class="score-detail">共 ${total} 题</div>
    <div class="result-chart">
      <div class="result-item correct-count"><div class="num" style="color:#2e7d32">${state.correct}</div><div>正确</div></div>
      <div class="result-item wrong-count"><div class="num" style="color:#c62828">${state.wrong}</div><div>错误</div></div>
    </div>`;
  
  if (state.wrongList.length > 0) {
    html += `<div class="error-list"><h3 style="color:#c62828;margin-bottom:12px">❌ 错题回顾</h3>`;
    state.wrongList.forEach(e => {
      html += `<div class="error-item">
        <div class="q">[${e.chapter}] ${e.question.length > 60 ? e.question.substring(0,60)+'...' : e.question}</div>
        <div>你选：<span style="color:#c62828">${e.userAnswer}</span></div>
        <div class="a">正确：${e.correct}</div>
      </div>`;
    });
    html += `</div>`;
  }
  
  html += `<div><button class="restart-btn" onclick="startQuiz()">🔄 再来一次</button>
    <button class="review-btn" onclick="location.reload()">📋 刷新</button></div>
  </div>`;
  
  document.getElementById('quizArea').innerHTML = html;
  document.getElementById('progressNum').textContent = `${total}/${total}`;
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('correctNum').textContent = state.correct;
  document.getElementById('wrongNum').textContent = state.wrong;
}

function updateStats() {
  const total = state.questions.length;
  const done = state.finished ? total : state.idx + (state.answered ? 1 : 0);
  document.getElementById('progressNum').textContent = `${done}/${total}`;
  document.getElementById('progressBar').style.width = `${(done/total)*100}%`;
  document.getElementById('correctNum').textContent = state.correct;
  document.getElementById('wrongNum').textContent = state.wrong;
}

window.onload = startQuiz;
</script>
</body>
</html>
